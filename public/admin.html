<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사내 ERP - 인사마스터 콘솔</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background-color: #f5f7fb; color: #333; }
        .container { max-width: 750px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        input, select { padding: 12px; font-size: 15px; width: 100%; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .login-btn { background: #1e3a8a; color: white; width: 100%; padding: 14px; }
        .admin-btn { background-color: #3b82f6; color: white; width: 100%; padding: 14px; }
        .hidden { display: none !important; }
        .rule-box { background: #f8fafc; padding: 20px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 25px; }
        .chip { display: inline-block; background: #e2e8f0; padding: 6px 12px; margin: 4px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .chip span { margin-left: 8px; color: #ef4444; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. 관리자 암호 로그인 -->
        <div id="adminLoginSection" style="text-align: center;">
            <h1>🔒 사내 ERP 관리자 로그인</h1>
            <input type="text" id="adminId" placeholder="관리자 사번 (ADMIN-01)"><br>
            <input type="password" id="adminPwd" placeholder="관리자 패스워드"><br>
            <button class="login-btn" onclick="loginAdmin()">관리자 콘솔 접속</button>
        </div>

        <!-- 2. 관리자 메인 대시보드 -->
        <div id="adminMainDashboard" class="hidden">
            <h1 style="color:#1e3a8a; text-align:center;">인사마스터 제어 콘솔</h1>
            
            <div class="rule-box">
                <h3>📍 회사 위치 및 출근 제한 거리 관리</h3>
                <p>현재 설정 주소: <strong id="currentAddress" style="color:#1e3a8a; font-size:13px;">불러오는 중...</strong></p>
                <p>현재 제한 거리: <strong id="currentLimit" style="color:#10b981;">로딩중...</strong></p>
                <input type="text" id="addressInput" placeholder="회사 실제 주소"><br>
                <input type="text" id="latInput" placeholder="위도" style="width:32%; display:inline-block;">
                <input type="text" id="lonInput" placeholder="경도" style="width:32%; display:inline-block;">
                <input type="number" id="limitInput" placeholder="제한 거리 (미터 단위 예: 100)" style="width:32%; display:inline-block;"><br>
                <button style="background:#1e3a8a; color:white; width:100%; margin-top:5px;" onclick="updateLocation()">회사 주소 및 거리 제한 업데이트</button>
                <hr style="border:0; border-top:1px solid #e2e8f0; margin:20px 0;">

                <h3>🏢 사내 부서 관리</h3><div id="teamChips"></div>
                <input type="text" id="teamInput" placeholder="팀명" style="width:70%; margin-top:10px;"><button style="background:#475569; color:white; width:25%; float:right; margin-top:10px;" onclick="addItem('teams', 'teamInput')">추가</button>
                <div style="clear:both; margin-bottom:15px;"></div>

                <h3>🎖️ 사내 직급 관리</h3><div id="positionChips"></div>
                <input type="text" id="positionInput" placeholder="직급명" style="width:70%; margin-top:10px;"><button style="background:#475569; color:white; width:25%; float:right; margin-top:10px;" onclick="addItem('positions', 'positionInput')">추가</button>
                <div style="clear:both;"></div>
            </div>

            <h3> 입사 신청자 정보 등록</h3>
            <input type="text" id="newName" placeholder="사원 성명"><br>
            <input type="password" id="newPwd" placeholder="초기 패스워드"><br>
            <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:5px;">📅 입사일자 선택</label>
            <input type="date" id="newJoinDate"><br>
            <select id="newTeam"></select><select id="newPosition"></select>
            <button class="admin-btn" onclick="registerEmployee()">사원 자동 발급 및 입사 완료</button>

            <h3 style="margin-top:40px;">👥 전사원 명단 및 남은 연차 현황</h3>
            <table>
                <thead><tr><th>사번</th><th>이름</th><th>소속</th><th>직급</th><th>입사일</th><th>생성된 연차</th><th>사용한 연차</th><th>남은 연차</th></tr></thead>
                <tbody id="employeeTableBody"></tbody>
            </table>

            <h3 style="margin-top:40px;">📝 전사원 실시간 근태 모니터링</h3>
            <table>
                <thead><tr><th>사번</th><th>이름</th><th>소속</th><th>직급</th><th>출근시간</th><th>퇴근시간</th></tr></thead>
                <tbody id="attendanceTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let adminId = ""; let adminPwd = ""; let globalConfig = {};
        
        // 오늘 날짜 기본 세팅
        document.getElementById('newJoinDate').value = new Date().toISOString().split('T')[0];

        async function loginAdmin() {
            adminId = document.getElementById('adminId').value.trim(); adminPwd = document.getElementById('adminPwd').value.trim();
            const res = await fetch('/api/hr/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd }) });
            if(res.status !== 200) return alert('관리자 인증 실패');
            document.getElementById('adminLoginSection').classList.add('hidden');
            document.getElementById('adminMainDashboard').classList.remove('hidden');
            loadConfig(); loadAdminData(); loadEmployeeListData();
        }
        async function loadConfig() {
            const res = await fetch('/api/hr/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd }) });
            globalConfig = await res.json();
            document.getElementById('currentAddress').innerText = `${globalConfig.companyAddress} (위도: ${globalConfig.latitude}, 경도: ${globalConfig.longitude})`;
            document.getElementById('currentLimit').innerText = `${globalConfig.limitDistance} 미터 이내만 출근 가능`;
            
            const teamChips = document.getElementById('teamChips'); const newTeamSelect = document.getElementById('newTeam');
            teamChips.innerHTML = ""; newTeamSelect.innerHTML = "";
            globalConfig.teams.forEach((t, idx) => { teamChips.innerHTML += `<div class="chip">${t}<span onclick="removeItem('teams', ${idx})">×</span></div>`; newTeamSelect.innerHTML += `<option value="${t}">${t}</option>`; });
            const posChips = document.getElementById('positionChips'); const newPosSelect = document.getElementById('newPosition');
            posChips.innerHTML = ""; newPosSelect.innerHTML = "";
            globalConfig.positions.forEach((p, idx) => { posChips.innerHTML += `<div class="chip">${p}<span onclick="removeItem('positions', ${idx})">×</span></div>`; newPosSelect.innerHTML += `<option value="${p}">${p}</option>`; });
        }
        async function updateLocation() {
            const address = document.getElementById('addressInput').value.trim(); const lat = document.getElementById('latInput').value.trim(); const lon = document.getElementById('lonInput').value.trim(); const limit = document.getElementById('limitInput').value.trim();
            if(!address || !lat || !lon || !limit) return alert('모든 정보를 입력하세요');
            globalConfig.companyAddress = address; globalConfig.latitude = parseFloat(lat); globalConfig.longitude = parseFloat(lon); globalConfig.limitDistance = parseInt(limit);
            await sendConfigUpdate(); alert('회사 주소 및 거리 설정 완료');
        }
        async function addItem(key, inputId) { const value = document.getElementById(inputId).value.trim(); if(!value) return; globalConfig[key].push(value); await sendConfigUpdate(); document.getElementById(inputId).value = ""; }
        async function removeItem(key, index) { globalConfig[key].splice(index, 1); await sendConfigUpdate(); }
        async function sendConfigUpdate() { await fetch('/api/hr/config/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd, ...globalConfig }) }); loadConfig(); }
        
        async function registerEmployee() {
            const name = document.getElementById('newName').value; const newEmpPassword = document.getElementById('newPwd').value;
            const joinDate = document.getElementById('newJoinDate').value;
            const team = document.getElementById('newTeam').value; const position = document.getElementById('newPosition').value;
            const res = await fetch('/api/hr/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd, name, newEmpPassword, team, position, joinDate }) });
            const result = await res.json();
            if(res.status === 200) { alert(`입사 완료! 사번: [ ${result.generatedId} ]`); document.getElementById('newName').value = ""; document.getElementById('newPwd').value = ""; loadConfig(); loadAdminData(); loadEmployeeListData(); }
        }
        async function loadAdminData() {
            const res = await fetch('/api/attendance/list', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd }) });
            const data = await res.json(); const tbody = document.getElementById('attendanceTableBody'); tbody.innerHTML = "";
            if(data.logs) { data.logs.forEach(log => { tbody.innerHTML += <tr><td>${log.employeeId}</td><td>${log.name}</td><td>${log.team}</td><td>${log.position}</td><td>${log.checkInTime}</td><td>${log.checkOutTime || '재직중'}</td></tr>; }); }}async function loadEmployeeListData() {const res = await fetch('/api/hr/employees', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requesterId: adminId, password: adminPwd }) });const data = await res.json(); const tbody = document.getElementById('employeeTableBody'); tbody.innerHTML = "";if(data.employees) {data.employees.forEach(emp => {tbody.innerHTML += <tr><td>${emp.id}</td><td>${emp.name}</td><td>${emp.team}</td><td>${emp.position}</td><td>${emp.joinDate}</td><td>${emp.vacation.total}</td><td>${emp.vacation.used}</td><td style="font-weight:bold; color:blue;">${emp.vacation.left}</td></tr>;});}}
