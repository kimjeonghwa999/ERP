<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 1. [필수] 스마트폰 화면 크기에 맞춰 가로 폭을 자동으로 조절해 주는 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 ERP - 출퇴근 체크</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="container">
        <h1>사내 ERP 근태 시스템</h1>
        <p style="color:#64748b; margin-bottom:25px;">사원번호와 비밀번호를 입력 후 인증해 주세요.</p>
        <input type="text" id="empId" placeholder="사원번호"><br>
        <input type="password" id="empPwd" placeholder="비밀번호"><br>
        <button class="in" onclick="checkIn()">출근하기</button>
        <button class="out" onclick="checkOut()">퇴근하기</button>
        <div id="log"></div>
    </div>
    <!-- 외부 JS 연결 -->
    <script src="/js/main.js"></script>
</body>
</html>
